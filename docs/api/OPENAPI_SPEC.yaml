        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, status]
              properties:
                id:
                  type: integer
                status:
                  $ref: '#/components/schemas/CaseStatus'
                notes:
                  type: string
      responses:
        '200':
          description: "Statut mis à jour"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'

  /trpc/cases.makeDecision:
    post:
      tags: [cases]
      operationId: cases.makeDecision
      summary: "Décision finale sur un dossier"
      description: |
        Enregistre la décision finale sur un dossier d'investigation.
        - `SAR_FILED` : Déclaration de Soupçon déposée (SAR/DOS)
        - `STR_FILED` : Déclaration de Transaction Suspecte déposée
        - `CLOSED_NO_ACTION` : Dossier clôturé sans suite
        - `ESCALATED` : Escalade hiérarchique
        Requiert le rôle `compliance_officer` ou `admin`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, decision]
              properties:
