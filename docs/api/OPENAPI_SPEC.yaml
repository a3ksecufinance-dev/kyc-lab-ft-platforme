  # DOCUMENTS
  # ══════════════════════════════════════════════════════════════════════════════

  /api/documents/upload:
    post:
      tags: [documents]
      operationId: documents.upload
      summary: "Uploader un document d'identité"
      description: |
        Upload multipart d'un document. Déclenche automatiquement :
        1. OCR (Tesseract) — extraction des champs et texte brut
        2. Analyse MRZ si applicable (passeport, carte d'identité)
        3. eKYC — vérification de cohérence et score de confiance
        Le traitement est synchrone. La réponse inclut les résultats OCR et eKYC.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, customerId, documentType]
              properties:
                file:
                  type: string
                  format: binary
                  description: "Fichier (PDF, JPEG, PNG — max 10 MB)"
                customerId:
                  type: integer
                documentType:
                  $ref: '#/components/schemas/DocumentType'
      responses:
        '200':
          description: "Document uploadé et traité"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  document:
                    $ref: '#/components/schemas/Document'
        '400':
          $ref: '#/components/responses/BadRequest'
        '413':
          description: "Fichier trop volumineux (max 10 MB)"

