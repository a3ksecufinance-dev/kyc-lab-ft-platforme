openapi: 3.0.3

info:
  title: "KYC-AML Platform API"
  version: "2.0.0"
  description: |
    ## Plateforme KYC/AML — API de référence v2.0

    Cette API expose l'ensemble des fonctionnalités de la plateforme KYC-AML : gestion des clients,
    analyse transactionnelle temps réel, moteur de règles AML dynamiques, screening sanctions/PEP,
    gestion des alertes et des dossiers d'investigation, pKYC (Perpetual KYC) et production de
    rapports réglementaires (SAR, STR, goAML).

    ### Architecture
    L'API est construite sur **tRPC** exposé via Express. Les endpoints tRPC suivent la convention
    `POST /trpc/<router>.<procedure>` pour les mutations et `GET /trpc/<router>.<procedure>` pour
    les queries. Le webhook CBS est un endpoint REST standard.

    ### Authentification
    Tous les endpoints (sauf `/health`, `/metrics` et `/webhooks/transaction`) nécessitent un
    **Bearer JWT** valide obtenu via `auth.login`. Les tokens d'accès ont une durée de vie de
    **15 minutes**. Le refresh token est valide **7 jours**.

    ### Moteur AML
    Chaque transaction soumise déclenche synchroniquement le moteur de règles AML. Le score de
    risque (0–100) et les règles déclenchées sont retournés dans la réponse et stockés dans
    `risk_rules` (JSONB).

    ### Conformité réglementaire
    La plateforme supporte : TRACFIN (France), goAML v2 (GAFI/FATF), OFAC, EU Sanctions,
    UN Consolidated List, UK Sanctions List, OpenSanctions PEP.

    ### Contact & support
    Voir coordonnées ci-dessous. Pour les incidents de production, utiliser le canal P1 défini
    dans le contrat de support.
  contact:
    name: "Équipe Compliance Engineering"
    email: "api-support@kyc-aml.platform"
    url: "https://docs.kyc-aml.platform"
  license:
    name: "Propriétaire — Tous droits réservés"
    url: "https://kyc-aml.platform/license"
  x-logo:
    url: "https://kyc-aml.platform/logo.png"

servers:
  - url: "https://api.{client-domain}/"
    description: "Production"
    variables:
      client-domain:
        default: "kyc-aml.platform"
        description: "Domaine client fourni lors de l'onboarding"
  - url: "https://staging-api.{client-domain}/"
    description: "Staging / Recette"
    variables:
      client-domain:
        default: "staging.kyc-aml.platform"
  - url: "http://localhost:3000/"
    description: "Développement local"

# ─── Security ──────────────────────────────────────────────────────────────────

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Token JWT obtenu via `POST /trpc/auth.login`.
        À inclure dans le header `Authorization: Bearer <accessToken>`.
        Durée de vie : 15 minutes. Renouveler via `auth.refresh`.
    WebhookHMAC:
      type: apiKey
      in: header
      name: x-webhook-signature
      description: |
        Signature HMAC-SHA256 du body brut de la requête.
        Format : `sha256=<hex-digest>`
        Calculée avec `WEBHOOK_SECRET` (variable d'environnement côté CBS).
        Exemple : `x-webhook-signature: sha256=a1b2c3d4e5f6...`

# ─── Tags ──────────────────────────────────────────────────────────────────────

tags:
  - name: auth
    description: "Authentification, sessions JWT et MFA TOTP"
  - name: customers
    description: "Gestion des clients KYC — personnes physiques et morales"
  - name: transactions
    description: "Transactions financières et moteur AML temps réel"
  - name: alerts
    description: "Alertes AML générées par le moteur de règles"
  - name: cases
    description: "Dossiers d'investigation et workflow de décision"
  - name: screening
    description: "Screening sanctions, PEP et médias adverses"
  - name: reports
    description: "Rapports réglementaires SAR, STR, goAML"
  - name: dashboard
    description: "Métriques et statistiques tableau de bord"
  - name: admin
    description: "Administration — règles AML, juridictions, utilisateurs"
  - name: pkyc
    description: "Perpetual KYC — détection de dérive comportementale"
  - name: documents
    description: "Upload et vérification de documents d'identité (eKYC)"
  - name: network
    description: "Analyse de réseau et graphes de transactions"
  - name: aml-rules
    description: "Gestion des règles AML dynamiques"

# ─── Paths ─────────────────────────────────────────────────────────────────────

paths:

  # ══════════════════════════════════════════════════════════════════════════════
  # AUTH
  # ══════════════════════════════════════════════════════════════════════════════

  /trpc/auth.login:
    post:
      tags: [auth]
      operationId: auth.login
      summary: "Connexion — obtenir un JWT"
      description: |
        Authentifie un utilisateur par email/mot de passe. Si le compte a le MFA activé,
        le champ `totpCode` est obligatoire. Retourne un `accessToken` (15 min) et un
        `refreshToken` (7 jours).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              standard:
                summary: "Connexion sans MFA"
                value:
                  email: "analyste@ma-banque.fr"
                  password: "MonMotDePasse!123"
              with_mfa:
                summary: "Connexion avec MFA TOTP"
                value:
                  email: "compliance@ma-banque.fr"
                  password: "MonMotDePasse!123"
                  totpCode: "847392"
      responses:
        '200':
          description: "Authentification réussie"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /trpc/auth.refresh:
    post:
      tags: [auth]
      operationId: auth.refresh
      summary: "Renouveler les tokens"
      description: |
        Échange un `refreshToken` valide contre une nouvelle paire de tokens.
        Le refreshToken utilisé est immédiatement invalidé (rotation).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  description: "Token de rafraîchissement JWT"
      responses:
        '200':
          description: "Nouveaux tokens émis"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /trpc/auth.logout:
    post:
      tags: [auth]
      operationId: auth.logout
      summary: "Déconnexion — invalider la session"
      description: |
        Invalide le refreshToken dans Redis. L'accessToken reste valide jusqu'à son
        expiration naturelle (max 15 min). Pour une révocation immédiate, utiliser
        la liste de révocation (feature entreprise).
      responses:
        '200':
          description: "Session invalidée"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /trpc/auth.me:
    get:
      tags: [auth]
      operationId: auth.me
      summary: "Profil de l'utilisateur connecté"
      description: "Retourne les informations de l'utilisateur associé au token JWT."
      responses:
        '200':
          description: "Profil utilisateur"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /trpc/auth.setupMfa:
    post:
      tags: [auth]
      operationId: auth.setupMfa
      summary: "Initialiser le MFA TOTP"
      description: |
        Génère un secret TOTP et retourne un QR code (base64 PNG) à scanner avec
        une application d'authentification (Google Authenticator, Authy, etc.).
        Le MFA n'est activé qu'après vérification via `auth.verifyMfa`.
      responses:
        '200':
          description: "QR code TOTP généré"
          content:
            application/json:
              schema:
                type: object
                properties:
                  qrCode:
                    type: string
                    description: "Image QR code encodée en base64 (PNG)"
                  secret:
                    type: string
                    description: "Secret TOTP (pour saisie manuelle)"
                  backupCodes:
                    type: array
                    items:
                      type: string
                    description: "8 codes de secours à usage unique"

  /trpc/auth.verifyMfa:
    post:
      tags: [auth]
      operationId: auth.verifyMfa
      summary: "Activer le MFA TOTP"
      description: "Vérifie le code TOTP et active le MFA sur le compte. Requiert un code valide généré depuis le QR de setupMfa."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [totpCode]
              properties:
                totpCode:
                  type: string
                  pattern: '^\d{6}$'
                  example: "123456"
      responses:
        '200':
          description: "MFA activé avec succès"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  mfaEnabledAt:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'

  # ══════════════════════════════════════════════════════════════════════════════
  # CUSTOMERS
  # ══════════════════════════════════════════════════════════════════════════════

  /trpc/customers.list:
    get:
      tags: [customers]
      operationId: customers.list
      summary: "Lister les clients"
      description: "Retourne une liste paginée de clients avec filtres optionnels."
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 20
        - name: search
          in: query
          description: "Recherche full-text sur nom, prénom, customerId, email"
          schema:
            type: string
        - name: riskLevel
          in: query
          schema:
            $ref: '#/components/schemas/RiskLevel'
        - name: kycStatus
          in: query
          schema:
            $ref: '#/components/schemas/KycStatus'
        - name: customerType
          in: query
          schema:
            $ref: '#/components/schemas/CustomerType'
        - name: sanctionStatus
          in: query
          schema:
            $ref: '#/components/schemas/SanctionStatus'
      responses:
        '200':
          description: "Liste paginée de clients"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCustomers'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /trpc/customers.get:
    get:
      tags: [customers]
      operationId: customers.get
      summary: "Récupérer un client"
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
          description: "ID interne du client"
      responses:
        '200':
          description: "Détail client"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          $ref: '#/components/responses/NotFound'

  /trpc/customers.create:
    post:
      tags: [customers]
      operationId: customers.create
      summary: "Créer un client"
      description: |
        Crée un nouveau client et initialise son profil KYC (statut PENDING).
        Un `customerId` unique est généré automatiquement si non fourni.
        Déclenche un screening sanctions initial en arrière-plan.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
            examples:
              individual:
                summary: "Particulier"
                value:
                  firstName: "Marie"
                  lastName: "Dupont"
                  email: "marie.dupont@email.fr"
                  phone: "+33612345678"
                  dateOfBirth: "1985-03-15"
                  nationality: "FR"
                  residenceCountry: "FR"
                  customerType: "INDIVIDUAL"
                  sourceOfFunds: "Salaire"
                  monthlyIncome: "3500.00"
      responses:
        '201':
          description: "Client créé"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /trpc/customers.update:
    patch:
      tags: [customers]
      operationId: customers.update
      summary: "Mettre à jour un client"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [id]
                  properties:
                    id:
                      type: integer
                - $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '200':
          description: "Client mis à jour"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          $ref: '#/components/responses/NotFound'

  /trpc/customers.updateKycStatus:
    patch:
      tags: [customers]
      operationId: customers.updateKycStatus
      summary: "Mettre à jour le statut KYC"
      description: |
        Met à jour le statut KYC d'un client. Transitions autorisées :
        `PENDING → IN_REVIEW → APPROVED | REJECTED`
        `APPROVED → EXPIRED`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, status]
              properties:
                id:
                  type: integer
                status:
                  $ref: '#/components/schemas/KycStatus'
                notes:
                  type: string
                  description: "Motif de la décision"
      responses:
        '200':
          description: "Statut KYC mis à jour"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'

  /trpc/customers.freeze:
    post:
      tags: [customers]
      operationId: customers.freeze
      summary: "Gel des avoirs"
      description: |
        Gèle les avoirs d'un client. Déclenche automatiquement le blocage de toutes
        les transactions en PENDING. Action réservée aux rôles `supervisor`, `compliance_officer` et `admin`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, reason]
              properties:
                id:
                  type: integer
                reason:
                  type: string
                  description: "Motif légal du gel (ex: décision judiciaire, sanction OFAC)"
      responses:
        '200':
          description: "Gel effectué"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  frozenAt:
                    type: string
                    format: date-time
        '403':
          $ref: '#/components/responses/Forbidden'

  /trpc/customers.requestErasure:
    post:
      tags: [customers]
      operationId: customers.requestErasure
      summary: "Demande d'effacement RGPD"
      description: |
        Enregistre une demande de droit à l'effacement (RGPD Art. 17).
        Le traitement effectif est asynchrone (délai légal de vérification).
        Les données d'audit obligatoires (LCB-FT) sont conservées conformément
        à la réglementation (5 ans minimum).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
                reason:
                  type: string
      responses:
        '200':
          description: "Demande d'effacement enregistrée"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  erasureRequestedAt:
                    type: string
                    format: date-time

  # ══════════════════════════════════════════════════════════════════════════════
  # TRANSACTIONS
  # ══════════════════════════════════════════════════════════════════════════════

  /trpc/transactions.list:
    get:
      tags: [transactions]
      operationId: transactions.list
      summary: "Lister les transactions"
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            maximum: 1000
            default: 20
        - name: customerId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TransactionStatus'
        - name: transactionType
          in: query
          schema:
            $ref: '#/components/schemas/TransactionType'
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
        - name: search
          in: query
          schema:
            type: string
        - name: isSuspicious
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: "Liste paginée de transactions"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTransactions'

  /trpc/transactions.get:
    get:
      tags: [transactions]
      operationId: transactions.get
      summary: "Récupérer une transaction"
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: "Détail transaction avec score AML et règles déclenchées"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '404':
          $ref: '#/components/responses/NotFound'

  /trpc/transactions.create:
    post:
      tags: [transactions]
      operationId: transactions.create
      summary: "Créer une transaction (déclenche le moteur AML)"
      description: |
        Crée une transaction et déclenche **synchroniquement** le moteur de règles AML.
        Le score de risque (0–100) et les règles déclenchées sont calculés et retournés
        dans la réponse. Si le score dépasse le seuil configuré, une alerte est créée
        automatiquement et la transaction passe en statut `FLAGGED`.

        **Latence attendue :**
        - Sans ML : < 200 ms
        - Avec ML (scoring neuronal) : < 500 ms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
            examples:
              virement:
                summary: "Virement SEPA standard"
                value:
                  transactionId: "CBS-TX-2024-089451"
                  customerId: 42
                  amount: "15000.00"
                  currency: "EUR"
                  transactionType: "TRANSFER"
                  channel: "ONLINE"
                  counterparty: "ACME Corp"
                  counterpartyCountry: "DE"
                  counterpartyBank: "Deutsche Bank AG"
                  purpose: "Règlement facture F-2024-0089"
      responses:
        '201':
          description: "Transaction créée avec résultat AML"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionWithAml'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: "Transaction déjà existante (idempotence — transactionId en doublon)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /trpc/transactions.block:
    post:
      tags: [transactions]
      operationId: transactions.block
      summary: "Bloquer une transaction"
      description: "Passe le statut de la transaction à `BLOCKED`. Action réversible uniquement par supervisor ou compliance_officer."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, reason]
              properties:
                id:
                  type: integer
                reason:
                  type: string
      responses:
        '200':
          description: "Transaction bloquée"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ══════════════════════════════════════════════════════════════════════════════
  # ALERTS
  # ══════════════════════════════════════════════════════════════════════════════

  /trpc/alerts.list:
    get:
      tags: [alerts]
      operationId: alerts.list
      summary: "Lister les alertes"
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/AlertStatus'
        - name: priority
          in: query
          schema:
            $ref: '#/components/schemas/AlertPriority'
        - name: alertType
          in: query
          schema:
            $ref: '#/components/schemas/AlertType'
        - name: assignedTo
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: "Liste paginée d'alertes"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAlerts'

  /trpc/alerts.get:
    get:
      tags: [alerts]
      operationId: alerts.get
      summary: "Récupérer une alerte"
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: "Détail alerte avec données d'enrichissement"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '404':
          $ref: '#/components/responses/NotFound'

  /trpc/alerts.assign:
    post:
      tags: [alerts]
      operationId: alerts.assign
      summary: "Assigner une alerte à un analyste"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, userId]
              properties:
                id:
                  type: integer
                userId:
                  type: integer
                  description: "ID de l'analyste à qui assigner l'alerte"
      responses:
        '200':
          description: "Alerte assignée"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'

  /trpc/alerts.resolve:
    post:
      tags: [alerts]
      operationId: alerts.resolve
      summary: "Résoudre ou fermer une alerte"
      description: |
        Clôture une alerte. Les valeurs de résolution possibles :
        - `FALSE_POSITIVE` : Alerte incorrecte, client légitime
        - `CLOSED` : Traitement terminé sans suite
        - `ESCALATED` : Escalade vers un dossier d'investigation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, resolution]
              properties:
                id:
                  type: integer
                resolution:
                  type: string
                  enum: [FALSE_POSITIVE, CLOSED, ESCALATED]
                notes:
                  type: string
                  description: "Commentaires de l'analyste"
      responses:
        '200':
          description: "Alerte résolue"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'

  # ══════════════════════════════════════════════════════════════════════════════
  # CASES
  # ══════════════════════════════════════════════════════════════════════════════

  /trpc/cases.list:
    get:
      tags: [cases]
      operationId: cases.list
      summary: "Lister les dossiers"
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/CaseStatus'
        - name: severity
          in: query
          schema:
            $ref: '#/components/schemas/CaseSeverity'
        - name: assignedTo
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: "Liste paginée de dossiers"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCases'

  /trpc/cases.create:
    post:
      tags: [cases]
      operationId: cases.create
      summary: "Créer un dossier d'investigation"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaseRequest'
      responses:
        '201':
          description: "Dossier créé"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'

  /trpc/cases.updateStatus:
    patch:
