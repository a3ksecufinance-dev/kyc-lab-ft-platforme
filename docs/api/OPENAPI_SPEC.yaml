  # WEBHOOKS
  # ══════════════════════════════════════════════════════════════════════════════

  /webhooks/transaction:
    post:
      tags: [transactions]
      operationId: webhooks.transaction
      summary: "Webhook CBS — réception de transaction"
      description: |
        Endpoint de réception des transactions émises par le CBS (Core Banking System).
        Ce endpoint ne requiert **pas** de Bearer JWT mais une **signature HMAC-SHA256**
        dans le header `x-webhook-signature`.

        ### Calcul de la signature
        ```
        HMAC-SHA256(WEBHOOK_SECRET, raw_body_bytes)
        ```
        Le header doit avoir la forme : `x-webhook-signature: sha256=<hex>`

        ### Idempotence
        Le champ `transactionId` est la clé d'idempotence. Une transaction avec un
        `transactionId` déjà existant retourne 200 sans retraitement.

        ### Traitement
        1. Vérification de la signature HMAC
        2. Déduplication (transactionId)
        3. Moteur AML synchrone (règles + ML si activé)
        4. Création alerte si score > seuil
        5. Retour du résultat complet
      security:
        - WebhookHMAC: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookTransactionPayload'
            examples:
              virement_entrant:
                summary: "Virement entrant"
                value:
                  transactionId: "CBS-2024-TX-089451"
                  customerId: 42
                  amount: "50000.00"
                  currency: "EUR"
                  transactionType: "TRANSFER"
                  channel: "API"
                  counterparty: "Shell Corp Ltd"
                  counterpartyCountry: "BVI"
                  counterpartyBank: "Offshore Trust Bank"
                  purpose: "Investment"
                  transactionDate: "2024-11-15T14:32:00Z"
      responses:
        '200':
          description: "Transaction traitée (ou déjà existante — idempotente)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionWithAml'
        '400':
          description: "Payload invalide"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: "Signature HMAC invalide ou absente"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

