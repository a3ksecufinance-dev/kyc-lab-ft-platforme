                  type: boolean
                alertId:
                  type: string
                  nullable: true

    CreateTransactionRequest:
      type: object
      required: [transactionId, customerId, amount, currency, transactionType]
      properties:
        transactionId:
          type: string
          description: "Identifiant unique CBS (clé d'idempotence)"
        customerId:
          type: integer
        amount:
          type: string
          example: "15000.00"
        currency:
          type: string
          default: "EUR"
        transactionType:
          $ref: '#/components/schemas/TransactionType'
        channel:
          $ref: '#/components/schemas/Channel'
        counterparty:
          type: string
        counterpartyCountry:
          type: string
        counterpartyBank:
          type: string
        purpose:
          type: string
        transactionDate:
          type: string
          format: date-time

    Alert:
      type: object
      properties:
        id:
          type: integer
        alertId:
          type: string
          example: "ALT-2024-00891"
        customerId:
          type: integer
        transactionId:
          type: integer
          nullable: true
        scenario:
          type: string
          example: "Transaction supérieure au seuil STR"
        alertType:
          $ref: '#/components/schemas/AlertType'
        priority:
          $ref: '#/components/schemas/AlertPriority'
        status:
          $ref: '#/components/schemas/AlertStatus'
        riskScore:
          type: integer
        reason:
          type: string
          nullable: true
        enrichmentData:
          type: object
          nullable: true
          description: "Données d'enrichissement contextuelles (JSONB)"
        assignedTo:
          type: integer
          nullable: true
        resolvedBy:
          type: integer
          nullable: true
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        resolution:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Case:
      type: object
      properties:
        id:
          type: integer
        caseId:
          type: string
          example: "CASE-2024-00034"
        customerId:
          type: integer
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/CaseStatus'
        severity:
          $ref: '#/components/schemas/CaseSeverity'
        assignedTo:
          type: integer
          nullable: true
        supervisorId:
          type: integer
          nullable: true
        linkedAlerts:
          type: array
          items:
            type: integer
          nullable: true
          description: "IDs des alertes liées au dossier"
        findings:
          type: string
          nullable: true
        decision:
          $ref: '#/components/schemas/CaseDecision'
        decisionNotes:
          type: string
          nullable: true
        decisionBy:
          type: integer
          nullable: true
        decisionAt:
          type: string
          format: date-time
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCaseRequest:
      type: object
      required: [customerId, title]
      properties:
        customerId:
          type: integer
        title:
          type: string
        description:
          type: string
        severity:
          $ref: '#/components/schemas/CaseSeverity'
        assignedTo:
          type: integer
        linkedAlerts:
          type: array
          items:
            type: integer
        dueDate:
          type: string
          format: date-time

    ScreeningResult:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        screeningType:
          $ref: '#/components/schemas/ScreeningType'
        status:
          $ref: '#/components/schemas/ScreeningStatus'
        matchScore:
          type: integer
          minimum: 0
          maximum: 100
        matchedEntity:
          type: string
          nullable: true
          example: "John DOE (alias: J. Doe)"
        listSource:
          type: string
          nullable: true
          example: "OFAC SDN"
        confidenceScore:
          type: integer
          minimum: 0
          maximum: 100
        details:
          type: object
          nullable: true
          description: "Données brutes du match (JSONB)"
        reviewedBy:
          type: integer
          nullable: true
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        decision:
          $ref: '#/components/schemas/ScreeningDecision'
        decisionReason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Report:
      type: object
      properties:
        id:
          type: integer
        reportId:
          type: string
          example: "RPT-SAR-2024-00123"
        reportType:
          $ref: '#/components/schemas/ReportType'
        customerId:
          type: integer
          nullable: true
        caseId:
          type: integer
          nullable: true
        title:
          type: string
        status:
          $ref: '#/components/schemas/ReportStatus'
        suspicionType:
          type: string
          nullable: true
        amountInvolved:
          type: string
          nullable: true
        currency:
          type: string
          nullable: true
        content:
          type: object
          nullable: true
          description: "Contenu structuré du rapport (JSONB)"
        submittedBy:
          type: integer
          nullable: true
        submittedAt:
          type: string
          format: date-time
          nullable: true
        approvedBy:
          type: integer
          nullable: true
        approvedAt:
          type: string
          format: date-time
          nullable: true
        regulatoryRef:
          type: string
          nullable: true
          description: "Référence attribuée par l'autorité de régulation"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GenerateReportRequest:
      type: object
      required: [reportType, title]
      properties:
        reportType:
          $ref: '#/components/schemas/ReportType'
        title:
          type: string
        customerId:
          type: integer
        caseId:
          type: integer
        suspicionType:
          type: string
        amountInvolved:
          type: string
        currency:
          type: string
        dateFrom:
          type: string
          format: date-time
        dateTo:
          type: string
          format: date-time

    Document:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        documentType:
          $ref: '#/components/schemas/DocumentType'
        fileName:
          type: string
          nullable: true
        fileUrl:
          type: string
          nullable: true
          description: "URL signée (S3) ou chemin local"
        fileSize:
          type: integer
          nullable: true
        mimeType:
          type: string
          nullable: true
        storageBackend:
          type: string
          enum: [local, s3]
        status:
          $ref: '#/components/schemas/DocumentStatus'
        expiryDate:
          type: string
          nullable: true
        documentNumber:
          type: string
          nullable: true
        issuingCountry:
          type: string
          nullable: true
        ocrData:
          type: object
          nullable: true
          description: "Champs extraits par OCR (JSONB)"
        ocrConfidence:
          type: integer
          nullable: true
          description: "Score de confiance OCR (0-100)"
        mrzData:
          type: object
          nullable: true
          description: "Données Machine Readable Zone parsées"
        ekycStatus:
          $ref: '#/components/schemas/EkycStatus'
        ekycScore:
          type: integer
          nullable: true
          description: "Score global eKYC (0-100)"
        ekycChecks:
          type: object
          nullable: true
          description: "Résultat détaillé de chaque contrôle eKYC"
        ekycProvider:
          type: string
          enum: [local, onfido, sumsub]
        verifiedBy:
          type: integer
          nullable: true
        verifiedAt:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PkycSnapshot:
      type: object
      properties:
        id:
          type: integer
        customerId:
          type: integer
        snapshotDate:
          type: string
          format: date-time
        driftScore:
          type: integer
          minimum: 0
          maximum: 100
          description: "Score de dérive comportementale (0=stable, 100=dérive maximale)"
        driftFactors:
          type: object
          nullable: true
          description: "Décomposition du score par facteur"
          properties:
            volumeDrift:
              type: number
            frequencyDrift:
              type: number
            geoDrift:
              type: number
            amountSpike:
              type: number
            newCounterparties:
              type: number
            newCountries:
              type: number
        reviewTriggered:
          type: boolean
        baselineDays:
          type: integer
          default: 30
        windowDays:
          type: integer
          default: 7

    PkycQueueItem:
      type: object
      properties:
        customerId:
          type: integer
        customerName:
          type: string
        driftScore:
          type: integer
        lastSnapshotDate:
          type: string
          format: date-time
        driftFactors:
          type: object

    AmlRuleResult:
      type: object
      description: "Résultat d'exécution d'une règle AML sur une transaction"
      properties:
        ruleId:
          type: string
          example: "RULE-THRESH-10K"
        ruleName:
          type: string
          example: "Seuil transaction unique > 10 000 EUR"
        category:
          $ref: '#/components/schemas/AmlRuleCategory'
        triggered:
          type: boolean
        score:
          type: integer
          minimum: 0
          maximum: 100
        details:
          type: object
          description: "Contexte d'exécution (valeurs comparées, fenêtre temporelle)"

    WebhookTransactionPayload:
      type: object
      required: [transactionId, customerId, amount, currency, transactionType]
      description: "Payload envoyé par le CBS vers /webhooks/transaction"
      properties:
        transactionId:
          type: string
          description: "Identifiant unique CBS — clé d'idempotence"
          example: "CBS-2024-TX-089451"
        customerId:
          type: integer
          description: "ID interne client KYC Platform"
        amount:
          type: string
          example: "50000.00"
        currency:
          type: string
          default: "EUR"
        transactionType:
          $ref: '#/components/schemas/TransactionType'
        channel:
          $ref: '#/components/schemas/Channel'
        counterparty:
          type: string
          nullable: true
        counterpartyCountry:
          type: string
          nullable: true
        counterpartyBank:
          type: string
          nullable: true
        purpose:
          type: string
          nullable: true
        transactionDate:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "analyste@ma-banque.fr"
        password:
          type: string
          format: password
          minLength: 8
          example: "MonMotDePasse!123"
        totpCode:
          type: string
          pattern: '^\d{6}$'
          description: "Code TOTP à 6 chiffres (requis si MFA activé)"
          example: "847392"

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: "JWT d'accès — durée de vie 15 minutes"
        refreshToken:
          type: string
          description: "Token de rafraîchissement — durée de vie 7 jours"
        expiresIn:
          type: integer
          description: "Durée de vie de l'accessToken en secondes"
          example: 900
        user:
          $ref: '#/components/schemas/UserProfile'

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: "UNAUTHORIZED"
            message:
              type: string
              example: "Token invalide ou expiré"
            details:
              type: object
              nullable: true

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
          example: "2.0.0"
        env:
          type: string
          enum: [development, staging, production]
        services:
          type: object
          properties:
            database:
              type: object
              properties:
                status:
                  type: string
                  enum: [healthy, unhealthy]
                latencyMs:
                  type: integer
            redis:
              type: object
              properties:
                status:
                  type: string
                  enum: [healthy, unhealthy]
            storage:
              type: object
              properties:
                status:
                  type: string
                  enum: [healthy, unhealthy]
                backend:
                  type: string
                  enum: [local, s3]

    # ── Paginated Responses ────────────────────────────────────────────────────

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
        hasNext:
          type: boolean
        hasPrev:
          type: boolean

    PaginatedCustomers:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Customer'
        pagination:
          $ref: '#/components/schemas/Pagination'

    PaginatedTransactions:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        pagination:
          $ref: '#/components/schemas/Pagination'

    PaginatedAlerts:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Alert'
        pagination:
          $ref: '#/components/schemas/Pagination'

    PaginatedCases:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Case'
        pagination:
          $ref: '#/components/schemas/Pagination'

    PaginatedScreeningResults:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ScreeningResult'
        pagination:
          $ref: '#/components/schemas/Pagination'

    PaginatedReports:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Report'
        pagination:
          $ref: '#/components/schemas/Pagination'

  # ── Responses ──────────────────────────────────────────────────────────────

  responses:
    BadRequest:
      description: "Requête invalide — paramètres manquants ou incorrects"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "BAD_REQUEST"
              message: "Le champ 'amount' est requis"

    Unauthorized:
      description: "Non authentifié — token manquant, invalide ou expiré"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "UNAUTHORIZED"
              message: "Token invalide ou expiré"

    Forbidden:
      description: "Accès refusé — droits insuffisants"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "FORBIDDEN"
              message: "Rôle 'compliance_officer' requis pour cette action"

    NotFound:
      description: "Ressource introuvable"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "NOT_FOUND"
              message: "Client introuvable"

    Conflict:
      description: "Conflit — ressource déjà existante"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "CONFLICT"
              message: "Un client avec cet identifiant existe déjà"

    TooManyRequests:
      description: "Trop de requêtes — rate limit atteint (100 req/min)"
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
          description: "Nombre maximum de requêtes par fenêtre"
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: "Requêtes restantes dans la fenêtre courante"
        X-RateLimit-Reset:
          schema:
            type: integer
          description: "Timestamp Unix de réinitialisation du compteur"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "TOO_MANY_REQUESTS"
              message: "Limite de 100 requêtes/minute dépassée"
