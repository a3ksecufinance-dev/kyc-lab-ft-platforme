        '200':
          description: "Plateforme opérationnelle"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: "Dégradé — un ou plusieurs services indisponibles"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /metrics:
    get:
      tags: [admin]
      operationId: metrics.prometheus
      summary: "Métriques Prometheus"
      description: |
        Expose les métriques au format Prometheus text/plain (prom-client).
        Métriques disponibles : requêtes HTTP (latence, volume, erreurs), connexions DB,
        connexions Redis, score AML moyen, alertes générées/heure.
      security: []
      responses:
        '200':
          description: "Métriques Prometheus"
          content:
            text/plain:
              schema:
                type: string
                example: |
                  # HELP http_requests_total Total HTTP requests
                  # TYPE http_requests_total counter
                  http_requests_total{method="POST",route="/trpc/transactions.create",status="200"} 14523
        '503':
          description: "Métriques non disponibles (prom-client non installé)"

