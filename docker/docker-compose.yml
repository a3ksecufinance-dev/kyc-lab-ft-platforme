version: "3.9"

services:
  # ─── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kyc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kyc_user
      POSTGRES_PASSWORD: kyc_password
      POSTGRES_DB: kyc_aml_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyc_user -d kyc_aml_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kyc_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── pgAdmin (optionnel, interface DB visuelle) ───────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kyc_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kyc.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [tools]

  # ─── MinIO — stockage S3 local (profil: s3) ───────────────────────────────────
  # Démarrer avec : docker compose --profile s3 up -d
  # Console web   : http://localhost:9001  (minioadmin / minioadmin)
  # Endpoint API  : http://localhost:9000
  # Configurer .env : STORAGE_BACKEND=s3, S3_ENDPOINT=http://localhost:9000,
  #                   S3_BUCKET=kyc-documents, S3_FORCE_PATH_STYLE=true,
  #                   S3_ACCESS_KEY_ID=minioadmin, S3_SECRET_ACCESS_KEY=minioadmin
  minio:
    image: minio/minio:latest
    container_name: kyc_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [s3]

  # Crée le bucket kyc-documents automatiquement (privé)
  minio-init:
    image: minio/mc:latest
    container_name: kyc_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/kyc-documents &&
        mc anonymous set none local/kyc-documents &&
        echo 'Bucket kyc-documents prêt (accès privé)'
      "
    profiles: [s3]

  # ─── ML Scoring Service (optionnel en dev) ───────────────────────────────────
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: kyc_ml
    restart: unless-stopped
    environment:
      ML_DATABASE_URL:      postgresql://kyc_user:kyc_password@postgres:5432/kyc_aml_db
      ML_INTERNAL_API_KEY:  dev_ml_key_changeme
      ML_DEBUG:             "true"
    ports:
      - "8000:8000"
    volumes:
      - ml_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [ml]

volumes:
  postgres_data:
    name: kyc_postgres_data
  redis_data:
    name: kyc_redis_data
  ml_models:
    name: kyc_ml_models_dev
  pgadmin_data:
    name: kyc_pgadmin_data
  minio_data:
    name: kyc_minio_data

networks:
  default:
    name: kyc_network
